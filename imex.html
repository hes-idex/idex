<!DOCTYPE html>
<html lang="nl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IMEX — HES International</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{--bg:#1a2e45;--surface:#213549;--surface2:#284058;--surface3:#2f4d6a;--border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.16);--text:#eef2f7;--muted:#5b7a99;--muted2:#90adc4;--hes:#e8401c;--green:#2ecc71;--yellow:#f5c542;--red:#e74c3c;--blue:#3498db;}
[data-theme="light"]{--bg:#f0f3f7;--surface:#fff;--surface2:#e8edf3;--surface3:#d8e0ea;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);--text:#1a2e45;--muted:#7a90a8;--muted2:#5a7a99;--hes:#e8401c;--green:#1a9e50;--yellow:#c49a00;--red:#c0392b;--blue:#1a6fba;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;min-height:100vh;}
.topbar{height:5px;background:linear-gradient(90deg,#e8401c,#ff6535);}
.page{padding:18px 24px;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.hes-logo{display:flex;align-items:center;gap:12px;}
.hes-text h1{font-family:"Syne",sans-serif;font-weight:800;font-size:20px;}
.hes-text p{color:var(--muted2);font-size:11px;margin-top:2px;}
.header-right{display:flex;gap:8px;align-items:center;}
.badge{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--muted2);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;transition:all .15s;}
.btn-nav{background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);}
.btn-nav:hover{background:var(--surface3);color:var(--text);}
.btn-theme{background:var(--surface2);color:var(--muted2);border:1px solid var(--border2);padding:7px 10px;}
.nav-bar{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:9px 14px;margin-bottom:18px;}
.nav-label{font-family:"Syne",sans-serif;font-weight:700;font-size:15px;flex:1;text-align:center;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:16px 18px;box-shadow:0 2px 6px rgba(0,0,0,.05);}
.card-title{font-family:"Syne",sans-serif;font-weight:700;font-size:13px;margin-bottom:12px;}
.kv{font-family:"Syne",sans-serif;font-size:34px;font-weight:800;line-height:1;}
.kl{font-size:11px;color:var(--muted2);margin-top:4px;}
.kt{font-size:11px;font-weight:600;margin-top:4px;}
.tu{color:var(--green);} .td{color:var(--red);} .tf{color:var(--muted2);}
.kpi-card{position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.ks::before{background:#1a9e50;} .kq::before{background:#1a6fba;} .kd::before{background:#c49a00;} .kc::before{background:#e8401c;}
.cause-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.cause-row:last-child{border-bottom:none;}
.cr-num{width:18px;height:18px;border-radius:4px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0;}
.cr-bar-bg{height:5px;background:var(--surface2);border-radius:3px;width:70px;overflow:hidden;}
.cr-bar{height:5px;border-radius:3px;}
.cat-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.prio-b{padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;}
.p1b{background:rgba(231,76,60,.15);color:#e74c3c;} .p2b{background:rgba(230,126,34,.15);color:#e67e22;} .p3b{background:rgba(245,197,66,.15);color:#c49a00;} .p4b{background:rgba(26,158,80,.15);color:#1a9e50;} .p0b{background:var(--surface2);color:var(--muted);}
.act-row{display:grid;grid-template-columns:36px 28px 1fr 70px 70px 80px;gap:0;align-items:stretch;}
.ac{padding:7px 8px;font-size:12px;border-bottom:1px solid var(--border);}
.act-head{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);background:var(--surface2);padding:6px 8px;border-bottom:1px solid var(--border);}
.do-red{color:#e74c3c;font-weight:600;} .do-ora{color:#e67e22;font-weight:600;} .do-ok{color:#1a9e50;font-weight:600;} .do-none{color:var(--muted);}
.pos-row{display:flex;align-items:flex-start;gap:7px;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border);}
.pos-row:last-child{border-bottom:none;}
.no-data{text-align:center;padding:32px;color:var(--muted2);font-size:13px;}
.idex-link{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;background:rgba(232,64,28,.12);color:var(--hes);border:1px solid rgba(232,64,28,.25);font-size:12px;font-weight:600;text-decoration:none;font-family:"DM Sans",sans-serif;}
.idex-link:hover{background:rgba(232,64,28,.2);}
input[type=date]{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:5px 10px;font-size:12px;font-family:"DM Sans",sans-serif;cursor:pointer;outline:none;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5);}
[data-theme="light"] input[type=date]::-webkit-calendar-picker-indicator{filter:none;}
.trend-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surface2);border-radius:8px;margin-bottom:6px;}
.hm-cell{border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;aspect-ratio:1;}
.hm-g{background:rgba(26,158,80,.2);color:#1a9e50;} .hm-y{background:rgba(196,154,0,.2);color:#c49a00;}
.hm-o{background:rgba(196,94,0,.2);color:#c45e00;} .hm-r{background:rgba(192,57,43,.2);color:#c0392b;} .hm-n{background:var(--surface2);color:var(--muted);}
.chart-bar{height:120px;display:flex;align-items:flex-end;gap:4px;padding-bottom:4px;}
.chart-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;}
.chart-bar-fill{border-radius:3px 3px 0 0;min-height:2px;width:100%;}
.chart-lbl{font-size:9px;color:var(--muted2);}
</style>
</head><body>

<script>
const DAYS=['zo','ma','di','wo','do','vr','za'];
const MONTHS=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
const MONTHS_SHORT=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const QS=['safety','quality','delivery','cost'];
const QS_LABELS={safety:'Safety',quality:'Quality',delivery:'Delivery',cost:'Cost'};
const QS_COLORS={safety:'#1a9e50',quality:'#1a6fba',delivery:'#c49a00',cost:'#e8401c'};

function pad(n){return String(n).padStart(2,'0');}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return{y,m,d};}
function friendlyDate(s){const{y,m,d}=parseDate(s);return DAYS[new Date(y,m-1,d).getDay()]+' '+d+' '+MONTHS[m-1]+' '+y;}
function shortDate(s){if(!s)return'—';const{m,d}=parseDate(s);return d+' '+MONTHS_SHORT[m-1];}
function getWeek(s){const{y,m,d}=parseDate(s);const dt=new Date(Date.UTC(y,m-1,d));const dn=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-dn);const ys=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil((((dt-ys)/86400000)+1)/7);}
function shiftDateStr(s,n){const{y,m,d}=parseDate(s);const nd=new Date(y,m-1,d+n);return nd.getFullYear()+'-'+pad(nd.getMonth()+1)+'-'+pad(nd.getDate());}
function weekMonday(s){const{y,m,d}=parseDate(s);const dt=new Date(y,m-1,d);const dn=dt.getDay()||7;dt.setDate(dt.getDate()-dn+1);return dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate());}
function monthStart(s){const{y,m}=parseDate(s);return y+'-'+pad(m)+'-01';}
function monthEnd(s){const{y,m}=parseDate(s);return y+'-'+pad(m)+'-'+pad(new Date(y,m,0).getDate());}
function daysInRange(from,to){const days=[];let cur=from;while(cur<=to){days.push(cur);cur=shiftDateStr(cur,1);}return days;}

function loadAllIDEX(){
  const days={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k||!k.startsWith('sqdc:')||k==='sqdc:done')continue;
    const dateStr=k.replace('sqdc:','');
    if(!/^\d{4}-\d{2}-\d{2}$/.test(dateStr))continue;
    try{days[dateStr]=JSON.parse(localStorage.getItem(k));}catch(e){}
  }
  return days;
}
function getDoneSet(){try{return new Set(JSON.parse(localStorage.getItem('sqdc:done')||'[]'));}catch(e){return new Set();}}

function aggregateRange(allData,from,to){
  const days=daysInRange(from,to);
  const r={totalDays:days.length,daysWithData:0,safeDays:0,
    causeFreq:{safety:{},quality:{},delivery:{},cost:{}},
    scoreSum:{safety:{},quality:{},delivery:{},cost:{}},
    scoreCnt:{safety:{},quality:{},delivery:{},cost:{}},
    actions:[],positieven:[],calColors:{safety:{},quality:{},delivery:{},cost:{}}};
  const doneSet=getDoneSet();
  days.forEach(dateStr=>{
    const day=allData[dateStr];if(!day)return;
    r.daysWithData++;
    QS.forEach(q=>{
      const qd=day[q];if(!qd)return;
      qd.calendar.forEach(c=>{if(c&&c!=='empty')r.calColors[q][c]=(r.calColors[q][c]||0)+1;});
      if(q==='safety'&&qd.calendar.some(c=>c==='green'))r.safeDays++;
      (qd.causes||[]).forEach(c=>{if(c&&c.trim())r.causeFreq[q][c]=(r.causeFreq[q][c]||0)+1;});
      (qd.positieven||[]).forEach(p=>{if(p&&p.trim())r.positieven.push({text:p,date:dateStr,cat:q});});
      (qd.scores||[]).forEach(sc=>{
        if(!sc.label)return;
        const v=parseFloat((sc.val||'0').replace(',','.'));
        r.scoreSum[q][sc.label]=(r.scoreSum[q][sc.label]||0)+v;
        r.scoreCnt[q][sc.label]=(r.scoreCnt[q][sc.label]||0)+1;
      });
      [...(qd.actions||[]),...(qd.followups||[])].forEach(a=>{
        if(!a||(!(a.wat||'').trim()))return;
        let daysLeft=null;
        if(a.wanneer){const today=new Date();today.setHours(0,0,0,0);const{y,m,d}=parseDate(a.wanneer);const dl=new Date(y,m-1,d);dl.setHours(0,0,0,0);daysLeft=Math.round((dl-today)/86400000);}
        r.actions.push({wat:a.wat.trim(),wie:(a.wie||'').trim(),prio:a.prio||0,cat:q,date:a.wanneer||'',daysLeft,sourceDate:dateStr,done:doneSet.has(dateStr+'|'+q+'|'+a.wat)});
      });
    });
  });
  return r;
}
function topCauses(freq,n=8){
  const all=[];
  QS.forEach(q=>Object.entries(freq[q]||{}).forEach(([text,count])=>all.push({text,count,cat:q})));
  return all.sort((a,b)=>b.count-a.count).slice(0,n);
}
function causeTotal(freq){return QS.reduce((s,q)=>s+Object.values(freq[q]||{}).reduce((a,b)=>a+b,0),0);}

function toggleTheme(){
  const h=document.documentElement;
  const n=h.getAttribute('data-theme')==='light'?'dark':'light';
  h.setAttribute('data-theme',n);localStorage.setItem('idex:theme',n);
  document.getElementById('ti-moon').style.display=n==='dark'?'block':'none';
  document.getElementById('ti-sun').style.display=n==='light'?'block':'none';
}
function initTheme(){
  const s=localStorage.getItem('idex:theme')||'dark';
  document.documentElement.setAttribute('data-theme',s);
  if(s==='light'){document.getElementById('ti-moon').style.display='none';document.getElementById('ti-sun').style.display='block';}
}

let curMonth = todayStr().substring(0,7)+'-01';
function getMonthRange(d){ return {from:monthStart(d),to:monthEnd(d)}; }
function shiftM(n){
  const {y,m}=parseDate(curMonth);
  let nm=m+n; let ny=y;
  if(nm>12){nm-=12;ny++;}if(nm<1){nm+=12;ny--;}
  curMonth=ny+'-'+pad(nm)+'-01'; render();
}
function goNow(){ curMonth=todayStr().substring(0,7)+'-01'; render(); }
function jump(v){ if(v){curMonth=v.substring(0,7)+'-01';render();} }

function render(){
  const {from,to}=getMonthRange(curMonth);
  const {y,m}=parseDate(from);
  let pm=m-1,py=y; if(pm<1){pm=12;py--;}
  const pFrom=py+'-'+pad(pm)+'-01', pTo=monthEnd(pFrom);
  const mLabel=MONTHS[m-1]+' '+y;
  document.getElementById('nav-label').innerHTML='<strong>'+mLabel+'</strong>';
  document.getElementById('mo-badge').textContent=mLabel;
  document.getElementById('dp').value=from;

  const all=loadAllIDEX();
  const C=aggregateRange(all,from,to);
  const P=aggregateRange(all,pFrom,pTo);

  renderKPI(C,P,mLabel);
  renderSummary(C,mLabel);
  renderCausesMonth(C);
  renderTrend6m(all,from);
  renderLongActions(all);
  renderMonthHeatmap(all,from,to);
}

function trendHtml(c,p,hib){
  if(p===0&&c===0)return '<span class="kt tf">geen data</span>';
  const d=c-p;if(d===0)return '<span class="kt tf">&#x2192; gelijk</span>';
  const good=hib?d>0:d<0;
  const pct=p>0?Math.round(Math.abs(d)/p*100):0;
  return '<span class="kt '+(good?'tu':'td')+'">'+(d>0?'&#x2191;':'&#x2193;')+' '+(d>0?'+':'')+d+(pct?' ('+pct+'%)':'')+'</span>';
}

function renderKPI(C,P,label){
  const sp=C.daysWithData>0?Math.round(C.safeDays/C.daysWithData*100):0;
  const pp=P.daysWithData>0?Math.round(P.safeDays/P.daysWithData*100):0;
  const op=C.actions.filter(a=>!a.done).length;
  const pp2=P.actions.filter(a=>!a.done).length;
  const tc=causeTotal(C.causeFreq), tp=causeTotal(P.causeFreq);
  const ov=C.actions.filter(a=>!a.done&&a.daysLeft!==null&&a.daysLeft<0).length;
  const pov=P.actions.filter(a=>!a.done&&a.daysLeft!==null&&a.daysLeft<0).length;
  document.getElementById('kpi').innerHTML=[
    {cls:'ks',v:sp+'%',l:'Veilige dagen',t:trendHtml(sp,pp,true)},
    {cls:'kq',v:tc,l:'Totaal meldingen',t:trendHtml(tc,tp,false)},
    {cls:'kd',v:op,l:'Open acties totaal',t:trendHtml(op,pp2,false)},
    {cls:'kc',v:ov,l:'Verlopen acties',t:trendHtml(ov,pov,false)},
  ].map(k=>`<div class="card kpi-card ${k.cls}"><div class="kv">${k.v}</div><div class="kl">${k.l}</div>${k.t}</div>`).join('');
}

function renderSummary(C,label){
  const el=document.getElementById('summary');
  const total=causeTotal(C.causeFreq);
  const open=C.actions.filter(a=>!a.done).length;
  const closed=C.actions.filter(a=>a.done).length;
  const pct=C.daysWithData>0?Math.round(C.safeDays/C.daysWithData*100):0;
  const topC=topCauses(C.causeFreq,3);
  el.innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
    <div>
      <div style="font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Samenvatting ${label}</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <div style="display:flex;justify-content:space-between;font-size:13px;"><span>Dagen met data</span><strong>${C.daysWithData} / ${C.totalDays}</strong></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;"><span>Veilige dagen</span><strong style="color:var(--green);">${pct}%</strong></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;"><span>Totaal meldingen</span><strong>${total}</strong></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;"><span>Acties open</span><strong style="color:var(--red);">${open}</strong></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;"><span>Acties afgerond</span><strong style="color:var(--green);">${closed}</strong></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;"><span>Positieve punten</span><strong>${C.positieven.length}</strong></div>
      </div>
    </div>
    <div>
      <div style="font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Top 3 oorzaken</div>
      ${topC.length?topC.map((c,i)=>`<div style="display:flex;align-items:center;gap:6px;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border);">
        <span style="font-weight:700;color:var(--muted);min-width:14px;">${i+1}</span>
        <div class="cat-dot" style="background:${QS_COLORS[c.cat]}"></div>
        <span style="flex:1;">${c.text}</span>
        <span style="color:var(--muted2);">${c.count}x</span>
      </div>`).join(''):'<div class="no-data">Geen oorzaken</div>'}
    </div>
  </div>`;
}

function renderCausesMonth(C){
  const top=topCauses(C.causeFreq,10);
  const el=document.getElementById('causes');
  if(!top.length){el.innerHTML='<div class="no-data">Geen oorzaken</div>';return;}
  const max=top[0].count;
  el.innerHTML=top.map((c,i)=>`<div class="cause-row">
    <div class="cr-num">${i+1}</div>
    <div class="cat-dot" style="background:${QS_COLORS[c.cat]}"></div>
    <div style="flex:1;font-size:12px;">${c.text}</div>
    <div class="cr-bar-bg" style="width:100px;"><div class="cr-bar" style="width:${Math.round(c.count/max*100)}%;background:${QS_COLORS[c.cat]};"></div></div>
    <div style="font-size:10px;color:var(--muted2);min-width:24px;text-align:right;">${c.count}x</div>
  </div>`).join('');
}

function renderTrend6m(all,fromStr){
  const el=document.getElementById('trend6m');
  const months=[];
  for(let i=5;i>=0;i--){
    const {y,m}=parseDate(fromStr);
    let tm=m-i,ty=y;while(tm<1){tm+=12;ty--;}
    const mStr=ty+'-'+pad(tm)+'-01';
    const agg=aggregateRange(all,monthStart(mStr),monthEnd(mStr));
    const sp=agg.daysWithData>0?Math.round(agg.safeDays/agg.daysWithData*100):0;
    months.push({label:MONTHS_SHORT[parseDate(mStr).m-1],safePct:sp,total:causeTotal(agg.causeFreq),open:agg.actions.filter(a=>!a.done).length});
  }
  const maxTotal=Math.max(...months.map(m=>m.total),1);
  const maxOpen=Math.max(...months.map(m=>m.open),1);
  el.innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
    <div>
      <div style="font-size:10px;color:var(--muted2);margin-bottom:8px;font-weight:600;">VEILIGE DAGEN %</div>
      <div class="chart-bar">${months.map(m=>`<div class="chart-col">
        <div style="font-size:9px;color:var(--muted2);">${m.safePct}%</div>
        <div class="chart-bar-fill" style="height:${Math.round(m.safePct/100*100)}px;background:#1a9e50;opacity:.8;"></div>
        <div class="chart-lbl">${m.label}</div>
      </div>`).join('')}</div>
    </div>
    <div>
      <div style="font-size:10px;color:var(--muted2);margin-bottom:8px;font-weight:600;">MELDINGEN PER MAAND</div>
      <div class="chart-bar">${months.map(m=>`<div class="chart-col">
        <div style="font-size:9px;color:var(--muted2);">${m.total}</div>
        <div class="chart-bar-fill" style="height:${Math.round(m.total/maxTotal*100)}px;background:#e8401c;opacity:.8;"></div>
        <div class="chart-lbl">${m.label}</div>
      </div>`).join('')}</div>
    </div>
    <div>
      <div style="font-size:10px;color:var(--muted2);margin-bottom:8px;font-weight:600;">OPEN ACTIES</div>
      <div class="chart-bar">${months.map(m=>`<div class="chart-col">
        <div style="font-size:9px;color:var(--muted2);">${m.open}</div>
        <div class="chart-bar-fill" style="height:${Math.round(m.open/maxOpen*100)}px;background:#1a6fba;opacity:.8;"></div>
        <div class="chart-lbl">${m.label}</div>
      </div>`).join('')}</div>
    </div>
  </div>`;
}

function renderLongActions(all){
  const el=document.getElementById('long-actions');
  const agg=aggregateRange(all,'2020-01-01',todayStr());
  const long=agg.actions.filter(a=>!a.done&&a.daysLeft!==null&&a.daysLeft<-30)
    .sort((a,b)=>(a.daysLeft||0)-(b.daysLeft||0)).slice(0,10);
  const old=agg.actions.filter(a=>!a.done&&!a.date)
    .slice(0,5);
  const all30=agg.actions.filter(a=>!a.done&&a.daysLeft!==null&&a.daysLeft<0).length;
  document.getElementById('la-sum').textContent=all30+' verlopen  |  '+long.length+' meer dan 30 dagen';
  if(!long.length&&!old.length){el.innerHTML='<div class="no-data">&#x2705; Geen langlopende acties</div>';return;}
  const cols='36px 28px 1fr 70px 90px';
  const prios=['--','P1','P2','P3','P4'];
  const pcls=['p0b','p1b','p2b','p3b','p4b'];
  el.innerHTML='<div style="display:grid;grid-template-columns:'+cols+';border-radius:8px;overflow:hidden;border:1px solid var(--border);">'
    +['Prio','Cat','Actie','Wie','Verlopen'].map(h=>`<div class="act-head">${h}</div>`).join('')
    +[...long,...old].slice(0,12).map((a,i)=>{
      const bg=i%2?'var(--surface)':'var(--surface2)';
      const dl=a.daysLeft!==null?Math.abs(a.daysLeft)+'d':'geen datum';
      const dc=a.daysLeft!==null&&a.daysLeft<-60?'do-red':a.daysLeft!==null&&a.daysLeft<0?'do-ora':'do-none';
      const s='background:'+bg+';';
      return `<div class="ac" style="${s}"><span class="prio-b ${pcls[a.prio]||'p0b'}">${prios[a.prio]||'--'}</span></div>`
            +`<div class="ac" style="${s}"><div class="cat-dot" style="background:${QS_COLORS[a.cat]};margin-top:3px;"></div></div>`
            +`<div class="ac" style="${s};font-weight:500;">${a.wat}<div style="font-size:10px;color:var(--muted2);">${shortDate(a.sourceDate)}</div></div>`
            +`<div class="ac" style="${s};color:var(--muted2);">${a.wie||'—'}</div>`
            +`<div class="ac" style="${s};"><span class="${dc}">${dl}</span></div>`;
    }).join('')
    +'</div>';
}

function renderMonthHeatmap(all,from,to){
  const days=daysInRange(from,to);
  const el=document.getElementById('month-heatmap');
  const {y,m}=parseDate(from);
  const firstDow=new Date(y,m-1,1).getDay()||7;
  const dayN=['Ma','Di','Wo','Do','Vr','Za','Zo'];
  let h='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">';
  h+=dayN.map(d=>`<div style="text-align:center;font-size:9px;font-weight:700;color:var(--muted2);padding-bottom:3px;">${d}</div>`).join('');
  for(let i=1;i<firstDow;i++) h+='<div></div>';
  days.forEach(ds=>{
    const day=all[ds];
    if(!day){h+=`<div class="hm-cell hm-n" style="font-size:9px;">${parseDate(ds).d}</div>`;return;}
    let worst='g';
    QS.forEach(q=>{const cal=(day[q]||{}).calendar||[];if(cal.includes('red'))worst='r';else if(cal.includes('orange')&&worst!=='r')worst='o';else if(cal.includes('yellow')&&!['r','o'].includes(worst))worst='y';});
    h+=`<div class="hm-cell hm-${worst}" style="font-size:9px;">${parseDate(ds).d}</div>`;
  });
  el.innerHTML=h+'</div>';
}

(function(){initTheme();render();})();
</script>
</body></html>
